services:
  - type: web
    name: cms-lab-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FIRST_ADMIN_EMAIL
        sync: false
      - key: FIRST_ADMIN_PASSWORD
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: APP_URL
        value: "https://cmslab-sales-dash.onrender.com"
    autoDeploy: true
