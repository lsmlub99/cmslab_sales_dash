name: Keep Alive

on:
  schedule:
    - cron: "*/14 * * * *"   # 14분마다 실행
  workflow_dispatch:          # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://cmslab-sales-dash.onrender.com/health")
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS"
          fi
