<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이메일 인증 — CMS Lab 매출 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);
      padding:40px 36px;width:100%;max-width:440px;text-align:center}
.icon{font-size:48px;margin-bottom:16px}
h2{font-size:20px;font-weight:700;margin-bottom:8px;color:#111827}
.sub{font-size:14px;color:#6b7280;margin-bottom:32px;line-height:1.6}

/* 3단계 진행 표시 */
.steps{display:flex;align-items:flex-start;justify-content:center;gap:0;margin-bottom:32px}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.step:not(:last-child)::after{
  content:'';position:absolute;top:18px;left:50%;
  width:100%;height:2px;background:#e5e7eb;z-index:0}
.step:not(:last-child).done::after{background:#1a56a0}
.step-circle{
  width:36px;height:36px;border-radius:50%;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  background:#e5e7eb;color:#9ca3af;font-weight:700;
  position:relative;z-index:1;flex-shrink:0}
.step.done .step-circle{background:#1a56a0;color:#fff}
.step.active .step-circle{background:#fef3c7;color:#d97706;border:2px solid #f59e0b}
.step-label{font-size:11px;color:#6b7280;margin-top:6px;white-space:nowrap}
.step.done .step-label{color:#1a56a0;font-weight:600}
.step.active .step-label{color:#d97706;font-weight:600}

.notice{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;
        padding:14px 16px;font-size:13px;color:#92400e;margin-bottom:24px;text-align:left;line-height:1.6}
.notice strong{display:block;margin-bottom:4px;color:#78350f}

.btn{display:inline-block;text-decoration:none;border-radius:7px;
     padding:11px 28px;font-size:14px;font-weight:600;margin-top:4px}
.btn-secondary{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}
.btn-secondary:hover{background:#e5e7eb}
.fail{color:#b91c1c}
.btn-danger{background:#fff;color:#b91c1c;border:1px solid #fecaca}
.btn-danger:hover{background:#fef2f2}
</style>
</head>
<body>
<div class="card">

  {% if success %}
  <div class="icon">✅</div>
  <h2>이메일 인증 완료!</h2>
  <p class="sub">{{ name }}님, 이제 한 단계만 남았어요.</p>

  <!-- 3단계 진행 -->
  <div class="steps">
    <div class="step done">
      <div class="step-circle">✓</div>
      <div class="step-label">가입 신청</div>
    </div>
    <div class="step done">
      <div class="step-circle">✓</div>
      <div class="step-label">이메일 인증</div>
    </div>
    <div class="step active">
      <div class="step-circle">⏳</div>
      <div class="step-label">관리자 승인</div>
    </div>
  </div>

  <div class="notice">
    <strong>관리자 승인 대기 중</strong>
    담당자가 계정을 확인 후 승인하면 로그인이 가능합니다.<br>
    승인까지 시간이 걸릴 수 있으니 잠시 기다려주세요.
  </div>

  <a href="/login" class="btn btn-secondary">로그인 페이지로</a>

  {% else %}
  <div class="icon">❌</div>
  <h2 class="fail">유효하지 않은 링크</h2>
  <p class="sub">이미 인증됐거나 만료된 링크입니다.<br>
     가입 페이지에서 다시 신청하면 새 인증 메일을 받을 수 있습니다.</p>
  <a href="/register" class="btn btn-danger">다시 가입 신청</a>
  {% endif %}

</div>
</body>
</html>
