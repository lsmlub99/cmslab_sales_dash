<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이메일 인증 — CMS Lab 매출 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);
      padding:48px 36px;width:100%;max-width:420px;text-align:center}
.icon{font-size:48px;margin-bottom:20px}
h2{font-size:20px;font-weight:700;margin-bottom:12px}
p{font-size:14px;color:#6c757d;line-height:1.7;margin-bottom:24px}
.btn{display:inline-block;background:#1a56a0;color:#fff;text-decoration:none;
     border-radius:7px;padding:11px 28px;font-size:14px;font-weight:600}
.btn:hover{background:#154080}
.fail{color:#b91c1c}
</style>
</head>
<body>
<div class="card">
  {% if success %}
  <div class="icon">✅</div>
  <h2>이메일 인증 완료!</h2>
  <p>{{ name }}님, 이메일이 인증됐습니다.<br>
     관리자 승인 후 로그인이 가능합니다.</p>
  <a href="/login" class="btn">로그인 페이지로</a>
  {% else %}
  <div class="icon">❌</div>
  <h2 class="fail">유효하지 않은 링크</h2>
  <p>이미 인증됐거나 만료된 링크입니다.<br>
     다시 가입을 시도하면 새 인증 메일을 받을 수 있습니다.</p>
  <a href="/register" class="btn">가입 페이지로</a>
  {% endif %}
</div>
</body>
</html>
